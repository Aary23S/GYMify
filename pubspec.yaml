name: gymflow
description: GymFlow - Complete Gym Management App
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter
  
  google_fonts: ^6.2.1

  # State Management
  flutter_riverpod: ^2.4.10
  riverpod_annotation: ^2.3.3

  # Navigation
  go_router: ^17.2.3

  # Supabase Backend
  supabase_flutter: ^2.3.4

  # Local Storage
  shared_preferences: ^2.2.3
  hive_flutter: ^1.1.0

  # HTTP
  dio: ^5.4.3

  # Firebase (Notifications only)
  firebase_core: ^4.7.0
  firebase_messaging: ^16.2.0
  flutter_local_notifications: ^21.0.0

  # Charts & Visualization
  fl_chart: ^1.2.0

  # Image Handling
  cached_network_image: ^3.3.1
  image_picker: ^1.1.0

  # QR Code
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.2.0

  # PDF Generation
  pdf: ^3.10.8
  printing: ^5.12.0

  # UI Extras
  flutter_svg: ^2.0.10
  lottie: ^3.3.3
  shimmer: ^3.0.0
  introduction_screen: ^4.0.0
  calendar_date_picker2: ^2.0.1
  flutter_staggered_animations: ^1.1.1
  badges: ^3.1.2
  dotted_border: ^3.1.0

  # Forms
  flutter_form_builder: ^10.3.0+2
  form_builder_validators: ^11.3.0

  # Utils
  intl: ^0.20.2
  uuid: ^4.3.3
  url_launcher: ^6.2.5
  share_plus: ^13.1.0

  # Icons
  cupertino_icons: ^1.0.6
  phosphor_flutter: ^2.0.1   # Rich icon set (free)

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
